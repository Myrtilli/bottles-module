syntax = "proto3";
package core.bottles; 

import "gogoproto/gogo.proto";
import "bottles/params.proto";

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/bottles/types"; 
// GenesisState defines the bottles module's genesis state.
message GenesisState {
