syntax = "proto3";
package dummychain.bottles;

import "gogoproto/gogo.proto";
import "dummychain/bottles/params.proto";

option go_package = "github.com/katherine/dummychain/x/bottles/types";

// GenesisState defines the bottles module's genesis state.
message GenesisState {
