syntax = "proto3";
package core.bottles;

option go_package = "github.com/Bridgeless-Project/bridgeless-core/v12/x/bottles/types";

// Msg defines the Msg service.
service Msg {
  rpc CreateBottle(MsgCreateBottle) returns (MsgCreateBottleResponse);
  rpc RemoveBottle(MsgRemoveBottle) returns (MsgRemoveBottleResponse);
}

message MsgCreateBottle {
  string creator = 1;
  string brand   = 2;
  string volume  = 3;
}

message MsgCreateBottleResponse {
  uint64 id = 1;
}

message MsgRemoveBottle {
  string creator = 1;
  uint64 id      = 2;
}

message MsgRemoveBottleResponse {}